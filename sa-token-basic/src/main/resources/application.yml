server:
  port: 8080

spring:
  application:
    name: sa-token-basic

# Sa-Token 配置
sa-token:
  # Token 名称（同时也是 Cookie/Header 名称）
  token-name: satoken
  # Token 有效期（单位：秒）默认30天，-1代表永不过期
  timeout: 2592000
  # Token 临时有效期（指定时间内无操作就视为token过期）单位：秒
  active-timeout: -1
  # 是否允许同一账号并发登录（为 true 时允许一起登录，为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token（为 true 时所有登录共用一个 token，为 false 时每次登录新建一个 token）
  is-share: true
  # Token 风格
  token-style: uuid
  # 是否输出操作日志
  is-log: true

# Knife4j Swagger 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.tangtang.satoken.controller

knife4j:
  enable: true
  setting:
    language: zh_cn
