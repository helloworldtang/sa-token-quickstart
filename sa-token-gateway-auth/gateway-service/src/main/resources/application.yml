server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # 用户服务路由
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1

        # 订单服务路由
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/order/**
          filters:
            - StripPrefix=1

        # 认证服务路由
        - id: auth-service
          uri: http://localhost:8083
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# Sa-Token 配置
sa-token:
  # Token 名称 (同时也是 Cookie 名称)
  token-name: satoken
  # Token 有效期，单位秒，-1 代表永久有效
  timeout: 2592000
  # Token 临时有效期 (指定时间内无操作就视为 Token 过期) 单位: 秒
  active-timeout: 1800
  # 是否允许同一账号并发登录 (为 true 时允许一起登录, 为 false 时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 Token (为 true 时所有登录共用一个 Token, 为 false 时每次登录新建一个 Token)
  is-share: false
  # Token 风格
  token-style: uuid
  # 是否输出操作日志
  is-log: true

# 日志配置
logging:
  level:
    root: INFO
    com.tangtang: DEBUG
    cn.dev33: DEBUG
