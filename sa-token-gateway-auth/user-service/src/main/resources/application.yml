server:
  port: 8081

spring:
  application:
    name: user-service
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# Sa-Token 配置
sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: 1800

# Knife4j 配置
knife4j:
  enable: true
  openapi:
    title: 用户服务 API
    description: 用户服务接口文档
    version: 1.0.0
    contact:
      name: tangtang
    license:
      name: Apache 2.0

# 日志配置
logging:
  level:
    root: INFO
    com.tangtang: DEBUG
